name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: .tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: .tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: .tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: .tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: .zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross linker (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p chrona-cli
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/chrona dist/
          cp LICENSE-MIT LICENSE-APACHE README.md dist/
          tar -czf chrona-${{ matrix.target }}.tar.gz -C dist .
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/chrona.exe dist/
          cp LICENSE-MIT dist/
          cp LICENSE-APACHE dist/
          cp README.md dist/
          Compress-Archive -Path dist/* -DestinationPath chrona-${{ matrix.target }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: chrona-${{ matrix.target }}
          path: chrona-${{ matrix.target }}${{ matrix.archive_ext }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*
